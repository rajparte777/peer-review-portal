<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Submit Project</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">
<h2>PeerReview</h2>
<ul>
       
        <li><a href="dashboard.jsp">Dash Board</a></li>
    </ul>
</nav>

<div class="form-container">

<h2>Submit Project</h2>

<form action="SubmitProjectServlet" method="post" enctype="multipart/form-data">
    
    <input type="text" name="title" placeholder="Project Title" required>
    
    <textarea name="description" placeholder="Description" required></textarea>
    
   <label>GitHub Project Link</label>
   <input type="url" name="githubLink" placeholder="Enter project GitHub link (optional)">

   <label>GitHub Profile Link</label>
   <input type="url" name="githubProfile" placeholder="Enter GitHub profile link (optional)">
    
    <!-- <input type="email" name="email" placeholder="Your Email" required> -->
    <p>Select multiple Img using control & select </p>
    <label>Upload Images / Video</label>
 <input type="file" name="mediaFiles" multiple accept="image/*,video/*">

    <button type="submit">Submit Project</button>
</form>
</div>

</body>
</html>
